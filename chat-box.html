<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Box</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    width: 420px;
    padding: 12px;
  }
  .chat-wrap {
    background: rgba(245, 240, 232, 0.92);
    border: 0.5px solid #ddd5c4;
    border-radius: 4px;
    padding: 12px 14px;
  }
  .chat-header {
    font-size: 9px;
    color: #a89880;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 0.5px solid #ddd5c4;
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .message {
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .username {
    font-size: 12px;
    font-weight: 500;
    color: #b5674a;
  }
  .text {
    font-size: 12px;
    color: #3a2e24;
    margin-left: 4px;
  }
</style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-header">Chat</div>
  </div>
</body>
</html>
